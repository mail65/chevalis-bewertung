<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHEVALIS — Danke!</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: Arial, sans-serif; background: #f5f5f0; min-height:100vh; display:flex; flex-direction:column; }
  .top-bar { height:5px; background: linear-gradient(90deg,#8B6914,#C9A227,#F0D060,#C9A227,#8B6914); }
  .header { background:#000; padding:20px 24px; }
  .brand { font-size:22px; font-weight:800; color:#C9A227; letter-spacing:4px; }
  .card { background:#fff; max-width:500px; margin:60px auto; padding:40px 32px; border-radius:4px; box-shadow:0 2px 12px rgba(0,0,0,.08); text-align:center; }
  .check { font-size:64px; margin-bottom:16px; }
  h1 { font-size:22px; color:#1a1a1a; margin-bottom:12px; }
  p { font-size:14px; color:#555; line-height:1.6; }
  .gold { color:#C9A227; font-weight:700; }
  .footer { text-align:center; padding:20px; font-size:11px; color:#999; margin-top:auto; }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="header"><div class="brand">CHEVALIS</div></div>
<div class="card">
  <div class="check">🐴✅</div>
  <h1>Vielen Dank!</h1>
  <p>Wir haben deine Anfrage erhalten und melden uns innerhalb von <span class="gold">5–7 Werktagen</span> mit deiner Gratis-Flasche.</p>
  <br>
  <p style="font-size:12px;color:#aaa">Dein CHEVALIS-Team aus Hamburg</p>
</div>
<div class="footer">BERGBAD Wellness GmbH · Poppenbütteler Bogen 92 · 22399 Hamburg</div>
</body>
</html>
